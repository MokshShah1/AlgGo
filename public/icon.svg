<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="alggo-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D7BFF" />
      <stop offset="0.5" stop-color="#9C8CFF" />
      <stop offset="1" stop-color="#46C6F5" />
    </linearGradient>
    <linearGradient id="alggo-line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#C7CCFF" />
      <stop offset="1" stop-color="#9BE8FF" />
    </linearGradient>
    <filter id="alggo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#alggo-bg)" />
  <rect x="34" y="34" width="444" height="444" rx="92" fill="#0B1020" />

  <!-- Rising graph line that reads as an "A": up to a peak, dip, then up to a node -->
  <g filter="url(#alggo-glow)">
    <path
      d="M120 396 L236 150 L300 300 L392 152"
      fill="none"
      stroke="url(#alggo-line)"
      stroke-width="34"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
  <!-- Crossbar of the A -->
  <path d="M188 300 L300 300" stroke="#FBFAF7" stroke-width="20" stroke-linecap="round" opacity="0.65" />

  <circle cx="120" cy="396" r="26" fill="#FBFAF7" filter="url(#alggo-glow)" />
  <circle cx="236" cy="150" r="20" fill="#C7CCFF" filter="url(#alggo-glow)" />
  <circle cx="392" cy="152" r="26" fill="#9BE8FF" filter="url(#alggo-glow)" />
</svg>
